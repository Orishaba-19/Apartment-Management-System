{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-lg-6 col-md-8 col-sm-10">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3" style="width: 56px; height: 56px;">
                        <i class="bi bi-person-plus-fill text-success fs-4"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Create your account</h3>
                    <p class="text-muted mb-0">Start managing apartments and payments securely.</p>
                </div>

                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Create Account</button>
                </form>

                <div class="mt-4 text-center">
                    <p class="mb-0 text-muted">
                        Already have an account? <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">Log In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
