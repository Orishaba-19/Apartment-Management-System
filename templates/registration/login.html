{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Sign In</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Log In</button>
                </form>

                {% if GOOGLE_CLIENT_ID %}
                <hr>
                <a href="{% url 'google_login' %}" class="btn btn-outline-danger w-100 mt-2">
                    <i class="bi bi-google"></i> Continue with Google
                </a>
                {% else %}
                <hr>
                <div class="alert alert-info mt-3 mb-0" role="alert">
                    Google sign-in will appear here once OAuth credentials are configured.
                </div>
                {% endif %}

                <p class="mt-3 mb-0">
                    No account yet? <a href="{% url 'register' %}">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
