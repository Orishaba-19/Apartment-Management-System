{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2>Delete House</h2>
        <p class="text-muted">This will permanently remove the house record.</p>
    </div>
    <a href="{% url 'house_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Houses
    </a>
</div>

<div class="card p-4">
    <p>Are you sure you want to delete the house <strong>{{ house.house_number }}</strong>?</p>
    <p>Monthly rent: UGX {{ house.monthly_rent }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash"></i> Delete House
        </button>
        <a href="{% url 'house_list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
